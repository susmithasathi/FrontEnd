<!DOCTYPE html>
<html>
<head>
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="expenses.css">
</head>

<body>

    <h1>Smart Expense Tracker Dashboard</h1>

    <div class="dashboard">

        <div class="card">
            <h3>Total Expense</h3>
            <p id="totalExpense">0</p>
        </div>

        <div class="card">
            <h3>Total Transactions</h3>
            <p id="totalTransactions">0</p>
        </div>

        <div class="card">
            <h3>Highest Expense</h3>
            <p id="highestExpense">0</p>
        </div>

    </div>

    <div class="form-section">

        <input type="text" id="title" placeholder="Expense Title">

        <input type="number" id="amount" placeholder="Amount">

        <select id="category">
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
        </select>

        <button id="addBtn">Add Expense</button>
    </div>
    <div class="filter">  
        <select id="filterCategory">
            <option value="All">All Categories </option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
        </select>
    </div>

    <table>

        <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="expenseTable"></tbody>

    </table>

<script>

    let expenses = [];

    // fetch()

    fetch("expenses.json")

    .then((response)=>{
        return response.json();
    })

    .then((data)=>{

        expenses = data;

        displayExpenses(expenses);

        updateDashboard();
    })

    .catch((error)=>{
        console.log("Error:", error);
    });


    const tableBody = document.getElementById("expenseTable");


    function displayExpenses(data){

        tableBody.innerHTML = "";

        data.forEach((expense)=>{

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${expense.title}</td>
                <td>${expense.category}</td>
                <td>₹${expense.amount}</td>
                <td>
                    <button class="delete-btn"
                    onclick="deleteExpense(${expense.id})">
                    Delete
                    </button>
                </td>
            `;

            tableBody.appendChild(row);

        });

    }


    // reduce()

    function updateDashboard(){

        const totalExpense = expenses.reduce((total,item)=>{
            return total + item.amount;
        },0);

        //condition ? trueValue : falseValue
        const highestExpense = expenses.reduce((max,item)=>{
            return item.amount > max ? item.amount : max;
        },0);

        //displays Total Expense
        document.getElementById("totalExpense").innerText = `₹${totalExpense}`;

        //length gives number items in array
        document.getElementById("totalTransactions").innerText = expenses.length;

        //by using ternary operator it gives the max amount(the highest expense)-displays the largest amount
        document.getElementById("highestExpense").innerText = `₹${highestExpense}`;

    }


    // Add Expense

    function addExpense(){

        const title = document.getElementById("title").value;

        const amount = Number(document.getElementById("amount").value);

        const category = document.getElementById("category").value;

        const newExpense = {
            //Date.now()->Generates unique id using current tim
            id:Date.now(),
            title,
            category,
            amount
        };

        //Adds new object into expenses array
        expenses.push(newExpense);

        displayExpenses(expenses);

        updateDashboard();

        document.getElementById("title").value = "";
        document.getElementById("amount").value = "";

    }


    // bind()

    const addButton = document.getElementById("addBtn");

    addButton.addEventListener(
        "click",
        addExpense.bind(this)
    );


    // filter()

    document.getElementById("filterCategory")

    .addEventListener("change",(e)=>{

        const value = e.target.value;

        if(value === "All"){

            displayExpenses(expenses);

        }else{

            const filteredExpenses = expenses.filter((expense)=>{
                return expense.category === value;
            });

            displayExpenses(filteredExpenses);

        }

    });


    // Delete Expense

    function deleteExpense(id){

        expenses = expenses.filter((expense)=>{
            return expense.id !== id;
        });

        displayExpenses(expenses);

        updateDashboard();

    }


    // Rest Operator

    function showCategories(...categories){

        console.log(categories);

    }

    showCategories(
        "Food",
        "Travel",
        "Shopping",
        "Bills"
    );

</script>

</body>
</html>
