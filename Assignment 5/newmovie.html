<!DOCTYPE html>
<html>
<head>
  <title>Movie Ticket Booking</title>

  <style>

    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    #movies {
      width: 500px;
      margin: auto;
    }

    .movie-card {
      background: white;
      padding: 20px;
      margin-bottom: 25px;
      border-radius: 10px;
      box-shadow: 0 0 8px lightgray;
    }

    .movie-card h2 {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #e9e9f5;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #d7d7ec;
    }

    #latestBox {
      width: 500px;
      margin: 40px auto;
    }

    .latest {
      background: lightgreen;
      padding: 15px;
      border-radius: 8px;
      font-size: 22px;
      margin-bottom: 15px;
    }

    .old {
      background: white;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 18px;
      box-shadow: 0 0 5px lightgray;
    }

  </style>
</head>

<body>

  <h1>Movie Ticket Booking</h1>

  <div id="movies">

    <div class="movie-card">

      <h2>Avengers</h2>

      <button onclick="bookTicket('Avengers')">
        Book Ticket
      </button>

    </div>

    <div class="movie-card">

      <h2>Batman</h2>

      <button onclick="bookTicket('Batman')">
        Book Ticket
      </button>

    </div>

    <div class="movie-card">

      <h2>Spider-Man</h2>

      <button onclick="bookTicket('Spider-Man')">
        Book Ticket
      </button>

    </div>

  </div>

  <div id="latestBox"></div>

  <script>

    let notifications = [];

    // REST OPERATOR

    function bookTicket(...movies) {
            
     
 let newNotifications = [];
      
      movies.forEach(function(movie) {

        newNotifications.push(
          movie + " ticket booked"
        );

      });

      // SPREAD OPERATOR

      notifications = [
        ...newNotifications,
        ...notifications
      ];

      showNotifications();
    }

    function showNotifications() {

      const latestBox =
        document.getElementById("latestBox");

      latestBox.innerHTML = "";

      // DESTRUCTURING

      const [latestNotification, ...oldNotifications] =
        notifications;

      // LATEST NOTIFICATION

      if (latestNotification) {

        latestBox.innerHTML += `

          <div class="latest">
            Latest: ${latestNotification}
          </div>

        `;
      }

      // OLD NOTIFICATIONS

      oldNotifications.forEach(function(note) {

        latestBox.innerHTML += `

          <div class="old">
            ${note}
          </div>

        `;

      });

    }

  </script>

</body>
</html>
