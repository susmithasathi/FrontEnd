<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="dashboard"></div>

<script>

const dashboard = document.getElementById("dashboard");

const adminName =
localStorage.getItem("adminName");

const darkMode =
localStorage.getItem("theme") === "dark";

if(darkMode){
    document.body.classList.add("dark");
}

async function loadStudents(){

    let students =
    JSON.parse(localStorage.getItem("students"));

    // ONLY FIRST TIME FETCH
    if(!students){

        const response =
        await fetch("students.json");

        students =
        await response.json();

        // INITIAL SAVE
        localStorage.setItem(
            "students",
            JSON.stringify(students)
        );
    }

    renderDashboard(students);
}

function renderDashboard(students){

    const presentCount =
        students.filter(
            s => s.attendance === "Present"
        ).length;

    const absentCount =
        students.filter(
            s => s.attendance === "Absent"
    ).length;

dashboard.innerHTML = `

<div class="topbar">

    <h2>Dashboard</h2>

    <div class="right-section">

        <button id="themeBtn">
            ${darkMode ? "🔆" : "🌙"}
        </button>

        <button id="attendanceBtn">
            Take Attendance
        </button>

        <div class="admin-name">
            ${adminName}
        </div>

    </div>

</div>

<div class="stats">

    <div class="box">
        <h3>Total Students</h3>
        <p>${students.length}</p>
    </div>

    <div class="box">
        <h3>Present</h3>
        <p>${presentCount}</p>
    </div>

    <div class="box">
        <h3>Absent</h3>
        <p>${absentCount}</p>
    </div>

</div>

<div class="student-container">

${students.map(student => `

<div class="student-card"
     data-id="${student.id}">

    <h3>${student.name}</h3>
    <p>${student.course}</p>

</div>

`).join("")}

</div>

<div class="details-box">

    <h2>Student Details</h2>

    <div id="detailsContent">
        Click Student Card
    </div>

</div>
`;

document.getElementById("attendanceBtn")
.addEventListener("click", () => {

    window.location.href =
    "attendance.html";
});

document.getElementById("themeBtn")
.addEventListener("click", () => {

    if(document.body.classList.contains("dark")){

        document.body.classList.remove("dark");

        localStorage.setItem(
            "theme",
            "light"
        );
    }
    else{

        document.body.classList.add("dark");

        localStorage.setItem(
            "theme",
            "dark"
        );
    }

    location.reload();
});

document.querySelectorAll(".student-card")
.forEach(card => {

    card.addEventListener("click", () => {

        const id =
        Number(card.dataset.id);

        const selectedStudent =
        students.find(
            s => s.id === id
        );

        showStudentDetails(
            selectedStudent
        );
    });
});

}

function showStudentDetails(student){

document.getElementById("detailsContent")
.innerHTML = `

<label>Name</label>
<input type="text"
       id="editName"
       value="${student.name}">

<label>Course</label>
<input type="text"
       id="editCourse"
       value="${student.course}">

<label>Phone</label>
<input type="text"
       id="editPhone"
       value="${student.phone}">

<label>Roll Number</label>
<input type="text"
       id="editRoll"
       value="${student.roll}">

<label>Email</label>
<input type="text"
       id="editMail"
       value="${student.mail}">

<button id="saveBtn">
    Save Changes
</button>
`;

document.getElementById("saveBtn")
.addEventListener("click", () => {

    let students =
    JSON.parse(localStorage.getItem("students"));

    students = students.map(s => {

        if(s.id === student.id){

            return {

                ...s,

                name:
                document.getElementById("editName").value,

                course:
                document.getElementById("editCourse").value,

                phone:
                document.getElementById("editPhone").value,

                roll:
                document.getElementById("editRoll").value,

                mail:
                document.getElementById("editMail").value
            };
        }

        return s;
    });

    localStorage.setItem(
        "students",
        JSON.stringify(students)
    );

    renderDashboard(students);

    alert("Student Updated");
});

}

loadStudents();

</script>

</body>
</html>
